name: Sync AI Config

# 從中央 repo 同步 Copilot 設定（copilot-instructions / prompts / instructions）到本 repo。
# 放置路徑：.github/workflows/sync-ai-config.yml
#
# ── 需要的設定：無 ────────────────────────────────────────────────────
#   中央 repo 為 public，因此不需要 token、secret 或 variable。
#   唯一需要開的權限（org 或 repo 層級皆可）：
#     Settings → Actions → General → Workflow permissions
#     → 勾選 Allow GitHub Actions to create and approve pull requests
#
#   注意：本 repo 可以是 private，不受影響 ——
#   讀取「公開的」中央 repo 不需要任何認證。
# ─────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 台灣時間 (UTC+8) 每天 05:00 與 17:00 各檢查一次；GitHub cron 以 UTC 計算，
    # 換算：05:00 UTC+8 = 21:00 UTC（前一日）、17:00 UTC+8 = 09:00 UTC。
    - cron: '0 9,21 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: '中央 repo 的 branch / tag（預設 main）'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write
  issues: write             # 「Open issue on failure」步驟建立 issue 時需要

# 同一時間只允許一個同步在跑，避免排程與手動觸發並發操作 chore/sync-ai-config 分支而衝突。
# cancel-in-progress: false — 讓進行中的同步跑完，不中途取消留下半完成狀態。
concurrency:
  group: sync-ai-config
  cancel-in-progress: false

env:
  # 可用 repo/org variable CENTRAL_AI_REPO 覆寫，未設定時使用預設值
  CENTRAL_AI_REPO: ${{ vars.CENTRAL_AI_REPO || 'M2Station/M2_AI_CONFIG' }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10       # 安全網：避免卡住的 job 空耗 runner
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      # 公開 repo，無需 token
      - name: Checkout central AI config
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CENTRAL_AI_REPO }}
          ref: ${{ inputs.ref || 'main' }}
          path: .central

      - name: Sync files
        id: sync
        env:
          # 透過環境變數傳入使用者可控的 ref，避免 ${{ }} 直接內插進 shell 造成 script injection
          SOURCE_REF: ${{ inputs.ref || 'main' }}
        run: |
          set -euo pipefail
          mkdir -p .github/prompts .github/instructions

          # 只同步這些路徑；其餘一概不動
          # 中央 repo 的 source of truth 就是它自己的 .github/（dogfooding）
          rsync -av --delete .central/.github/prompts/      .github/prompts/
          rsync -av --delete .central/.github/instructions/ .github/instructions/
          cp .central/.github/copilot-instructions.md       .github/copilot-instructions.md

          source_sha="$(git -C .central rev-parse HEAD)"
          rm -rf .central

          # 只在「實際同步的三個路徑」有變化時才寫 version 檔並開 PR。
          # AI_CONFIG_VERSION 內含 synced_at 時戳，若每跑都寫會製造假 diff、每次都開空 PR；
          # 故先比對內容，相同就 changed=false，下一步略過開 PR。
          if git status --porcelain -- \
               .github/copilot-instructions.md \
               .github/prompts \
               .github/instructions | grep -q .; then
            # 記錄來源版本，便於追溯
            {
              echo "source_repo: ${CENTRAL_AI_REPO}"
              echo "source_ref:  ${SOURCE_REF}"
              echo "source_sha:  ${source_sha}"
              echo "synced_at:   $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            } > .github/AI_CONFIG_VERSION
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "AI config 內容無變化，略過開 PR。"
          fi

      - name: Create pull request
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          branch: chore/sync-ai-config
          delete-branch: true
          commit-message: 'chore(ai): sync Copilot config from central repo'
          title: 'chore(ai): sync Copilot config from central repo'
          body: |
            由 `sync-ai-config` workflow 自動產生。

            ## What
            從中央 repo `${{ env.CENTRAL_AI_REPO }}` 同步 Copilot 設定檔。

            ## 同步範圍
            - `.github/copilot-instructions.md`
            - `.github/prompts/**`
            - `.github/instructions/**`

            ## Why
            集中維護通用規範與 prompt files，避免各 repo 各自分歧。

            ## Verification
            - [ ] diff 僅包含上述路徑
            - [ ] 本 repo 專屬的規範未被覆蓋（專案特定內容不應放在這些檔案中）

            來源版本見 `.github/AI_CONFIG_VERSION`。
          labels: |
            chore
            automated

      # 排程失敗通常沒人看 —— 明確開 issue 通知
      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'AI config 同步失敗',
              body: `排程同步失敗。\n\n[查看執行紀錄](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['chore', 'automated']
            });
