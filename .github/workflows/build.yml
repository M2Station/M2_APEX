name: Build

# CI: verify every push to main compiles in Release.
# (Pull requests are gated by pr-check.yml, so there is no pull_request trigger here.)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build (Release)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore M2_APEX.csproj

      - name: Build
        run: dotnet build M2_APEX.csproj -c Release --no-restore
