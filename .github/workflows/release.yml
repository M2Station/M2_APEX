name: Release

# Publish a GitHub Release for x64 and ARM64, each with a portable self-contained single-file
# EXE and an Inno Setup installer (Setup-*.exe).
# Triggered by pushing a version tag (e.g. v0.0.1), or manually via the Actions tab.
on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build and release, e.g. 0.0.1'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Publish ${{ matrix.rid }}
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [ win-x64, win-arm64 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $v = '${{ github.ref_name }}' -replace '^v', ''
          } else {
            $v = '${{ github.event.inputs.version }}'
          }
          if ($v -notmatch '^\d+\.\d+\.\d+$') { throw "Version '$v' is not semver (X.Y.Z)." }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Publish self-contained single file
        shell: pwsh
        run: |
          dotnet publish M2_APEX.csproj `
            -c Release -r ${{ matrix.rid }} --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:Version=${{ steps.ver.outputs.version }} `
            -o publish/${{ matrix.rid }}

      - name: Stage portable EXE
        shell: pwsh
        run: |
          $ver = '${{ steps.ver.outputs.version }}'
          $rid = '${{ matrix.rid }}'
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "publish/$rid/M2_APEX.exe" "dist/M2_APEX-$ver-$rid.exe"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $ver = '${{ steps.ver.outputs.version }}'
          $rid = '${{ matrix.rid }}'
          $arch = $rid -replace '^win-', ''
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=$ver" "/DArch=$arch" "/DSourceExe=$PWD\publish\$rid\M2_APEX.exe" "/DOutDir=$PWD\dist" "installer\M2_APEX.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.rid }}
          path: dist/*.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: M2_APEX ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/*.exe
